name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded: moonbitlang/async requires MSVC, not MinGW
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          moon version --all
          moon update

      - name: Build
        run: moon build --target native

      - name: Unit tests
        run: moon test --target native internal/protocol/

      - name: Integration tests
        if: runner.os == 'Linux'
        run: make test-integration
